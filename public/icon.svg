<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#68dc93"/>
      <stop offset="100%" stop-color="#4989b9"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect x="0" y="0" width="128" height="128" rx="28" ry="28" fill="url(#grad)"/>

  <!-- Larger outline circle -->
  <circle 
    cx="64" 
    cy="64" 
    r="46" 
    fill="none" 
    stroke="#ffffff" 
    stroke-width="4"/>

  <!-- Centered cron expression -->
  <text 
    x="50%" 
    y="50%" 
    text-anchor="middle" 
    dominant-baseline="middle"
    font-family="monospace" 
    font-size="44" 
    font-weight="600"
    fill="#ffffff">
    0_*
  </text>
</svg>